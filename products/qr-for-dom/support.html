<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Support — QR for Dom</title>
  <meta name="description" content="Contact support for QR for Dom. We are here to help.">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="../../css/app-style.css">
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

  <!-- Glow Backgrounds -->
  <div class="bg-glows">
    <div class="glow-1"></div>
    <div class="glow-2"></div>
  </div>

  <!-- Navigation -->
  <div class="app-container">
    <nav class="app-nav">
      <a href="index.html" class="app-nav-brand">
        <div class="app-nav-logo">
          <i data-lucide="qr-code" style="width: 20px; height: 20px;"></i>
        </div>
        QR for Dom
      </a>
      <div class="app-nav-links">
        <a href="index.html#features">Features</a>
        <a href="support.html" style="color: var(--app-text);">Support</a>
      </div>
    </nav>
  </div>

  <!-- Support Form Section -->
  <section class="app-features-section" style="padding: 80px 0; min-height: 80vh;">
    <div class="app-container">
      <div class="app-section-header">
        <h2 class="app-section-title">Get in touch.</h2>
        <p class="app-section-desc">Need help with QR for Dom? Fill out the form below and our team will reply within 24 hours.</p>
      </div>

      <form class="app-support-form" action="https://formsubmit.co/lamerique62@gmail.com" method="POST">
        <!-- Anti-spam honeypot -->
        <input type="text" name="_honey" style="display:none">
        <!-- Disable captcha for seamless experience -->
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_subject" value="New Support Request: QR for Dom">

        <div class="app-form-group">
          <label class="app-form-label" for="name">Name</label>
          <input type="text" id="name" name="name" class="app-form-control" required placeholder="John Doe">
        </div>
        
        <div class="app-form-group">
          <label class="app-form-label" for="email">Email</label>
          <input type="email" id="email" name="email" class="app-form-control" required placeholder="john@example.com">
        </div>

        <div class="app-form-group">
          <label class="app-form-label" for="subject">Subject</label>
          <input type="text" id="subject" name="Subject" class="app-form-control" required placeholder="How can we help?">
        </div>

        <div class="app-form-group">
          <label class="app-form-label" for="message">Message</label>
          <textarea id="message" name="message" class="app-form-control" rows="6" required placeholder="Describe your issue or request..."></textarea>
        </div>

        <button type="submit" class="app-btn-submit">
          Send Message <i data-lucide="send" style="width: 16px; height: 16px;"></i>
        </button>
      </form>
    </div>
  </section>

  <!-- Legal Links -->
  <section class="app-legal-links">
    <div class="app-container">
      <div class="app-legal-links-inner">
        <a href="privacy-policy.html">Privacy Policy</a>
        <a href="terms-and-conditions.html">Terms of Service</a>
        <a href="support.html">Support</a>
      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="app-footer">
    <div class="app-container">
      <p class="app-footer-copyright">© 2026 QR for Dom. All rights reserved.</p>
      <p class="app-footer-credit">Developed by <a href="../../index.html">Ebenezer Dream Studio</a></p>
    </div>
  </footer>

  <script>lucide.createIcons();</script>
</body>
</html>
